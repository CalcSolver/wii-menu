<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Wii Home Screen – OG Classics</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Helvetica", Arial, sans-serif;
    }

    body {
      background: radial-gradient(circle at top, #ffffff 0, #d9f0ff 40%, #a8c7e6 100%);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #wii-wrapper {
      width: 960px;
      height: 540px;
      background: rgba(255, 255, 255, 0.9);
      border-radius: 24px;
      padding: 18px 24px;
      position: relative;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.35);
      overflow: hidden;
      animation: fadeIn 1.2s ease forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to   { opacity: 1; transform: scale(1); }
    }

    #wii-header {
      display: flex;
      justify-content: flex-end;
      gap: 18px;
      font-size: 18px;
      color: #555;
      margin-bottom: 10px;
    }

    #wii-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(2, 1fr);
      gap: 12px;
      height: 78%;
    }

    .channel {
      background: linear-gradient(145deg, #fdfdfd, #e3e7ec);
      border-radius: 18px;
      border: 2px solid #cfd5dd;
      box-shadow:
        inset 0 0 0 1px #ffffff,
        0 4px 10px rgba(0, 0, 0, 0.18);
      position: relative;
      cursor: pointer;
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-4px); }
    }

    .channel.selected {
      transform: scale(1.05);
      border-color: #4aa8ff;
      box-shadow:
        0 0 0 3px rgba(74, 168, 255, 0.5),
        0 8px 18px rgba(0, 0, 0, 0.3);
    }

    .channel:hover {
      transform: scale(1.03);
    }

    .channel-inner {
      text-align: center;
      padding: 10px;
    }

    .channel-title-main {
      font-size: 18px;
      font-weight: bold;
      color: #444;
      text-shadow: 0 1px 0 #fff;
    }

    .channel-sub {
      font-size: 12px;
      color: #777;
      margin-top: 4px;
    }

    .channel-tag {
      position: absolute;
      bottom: 6px;
      left: 10px;
      font-size: 11px;
      color: #555;
      opacity: 0.9;
    }

    #wii-footer {
      margin-top: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      color: #444;
    }

    #channel-title {
      font-weight: bold;
    }

    #hint {
      font-size: 12px;
      color: #777;
    }

    #wii-pointer {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 3px solid #4aa8ff;
      background: rgba(255, 255, 255, 0.95);
      position: absolute;
      pointer-events: none;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px rgba(74, 168, 255, 0.7);
      z-index: 20;
    }

    #channel-overlay {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top,
        rgba(255, 255, 255, 0.98),
        rgba(200, 220, 240, 0.98));
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 15;
    }

    #overlay-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 30px 40px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      text-align: center;
      min-width: 360px;
    }

    #overlay-title {
      font-size: 26px;
      font-weight: bold;
      margin-bottom: 8px;
      color: #333;
    }

    #overlay-sub {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    #overlay-hint {
      font-size: 13px;
      color: #777;
    }

    #overlay-btn {
      margin-top: 18px;
      padding: 8px 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(145deg, #4aa8ff, #2f7edb);
      color: white;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.25);
    }

    #overlay-btn:hover {
      filter: brightness(1.05);
    }
  </style>
</head>
<body>
  <div id="wii-wrapper">
    <div id="wii-header">
      <div id="wii-date">Mon 01/01</div>
      <div id="wii-time">00:00</div>
    </div>

    <div id="wii-grid"></div>

    <div id="wii-footer">
      <div id="channel-title">Loading…</div>
      <div id="hint">Use arrow keys / mouse to move, Enter / click to open</div>
    </div>

    <div id="wii-pointer"></div>

    <div id="channel-overlay">
      <div id="overlay-card">
        <div id="overlay-title">Game Title</div>
        <div id="overlay-sub">OG Wii Classic</div>
        <div id="overlay-hint">
          Press ESC or click “Back” to return to the Wii Menu.
        </div>
        <button id="overlay-btn">Back to Wii Menu</button>
      </div>
    </div>
  </div>

  <script>
    const grid = document.getElementById("wii-grid");
    const titleEl = document.getElementById("channel-title");
    const pointerEl = document.getElementById("wii-pointer");
    const timeEl = document.getElementById("wii-time");
    const dateEl = document.getElementById("wii-date");
    const overlay = document.getElementById("channel-overlay");
    const overlayTitle = document.getElementById("overlay-title");
    const overlaySub = document.getElementById("overlay-sub");
    const overlayBtn = document.getElementById("overlay-btn");

    const channels = [
      { title: "Wii Sports",        sub: "Bowling • Tennis • Boxing", tag: "OG Pack-in" },
      { title: "Wii Play",          sub: "Tanks • Shooting Range",    tag: "Party Classic" },
      { title: "Wii Fit",           sub: "Balance Board Training",    tag: "Fitness" },
      { title: "Wii Sports Resort", sub: "Wuhu Island Adventures",    tag: "Resort" },
      { title: "Mario Kart Wii",    sub: "Online Chaos & Bikes",      tag: "Racing" },
      { title: "Super Mario Galaxy",sub: "Gravity-Defying Mario",     tag: "Platformer" },
      { title: "SSBB",              sub: "Super Smash Bros. Brawl",   tag: "Fighting" },
      { title: "Zelda: TP",         sub: "Twilight Princess",         tag: "Adventure" }
    ];

    let selected = 0;

    channels.forEach((ch, i) => {
      const div = document.createElement("div");
      div.className = "channel";

      const inner = document.createElement("div");
      inner.className = "channel-inner";

      const main = document.createElement("div");
      main.className = "channel-title-main";
      main.textContent = ch.title;

      const sub = document.createElement("div");
      sub.className = "channel-sub";
      sub.textContent = ch.sub;

      const tag = document.createElement("div");
      tag.className = "channel-tag";
      tag.textContent = ch.tag;

      inner.appendChild(main);
      inner.appendChild(sub);
      div.appendChild(inner);
      div.appendChild(tag);

      div.addEventListener("mouseenter", () => setSelected(i));
      div.addEventListener("click", () => openChannel(i));

      div.style.animationDelay = (i * 0.2) + "s";

      grid.appendChild(div);
    });

    function setSelected(i) {
      const all = document.querySelectorAll(".channel");
      if (all[selected]) all[selected].classList.remove("selected");
      selected = i;
      all[selected].classList.add("selected");
      titleEl.textContent = channels[selected].title;
      playMoveSound();
    }

    setSelected(0);

    document.addEventListener("mousemove", (e) => {
      pointerEl.style.left = e.clientX + "px";
      pointerEl.style.top = e.clientY + "px";
    });

    function openChannel(i) {
      overlayTitle.textContent = channels[i].title;
      overlaySub.textContent = channels[i].sub;
      overlay.style.display = "flex";
      playClickSound();
    }

    function closeOverlay() {
      overlay.style.display = "none";
    }

    overlayBtn.addEventListener("click", closeOverlay);
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeOverlay();
    });

    document.addEventListener("keydown", (e) => {
      const cols = 4;
      const rows = 2;
      const col = selected % cols;
      const row = Math.floor(selected / cols);

      if (overlay.style.display === "flex") {
        if (e.key === "Escape") closeOverlay();
        return;
      }

      if (e.key === "ArrowRight") {
        setSelected(row * cols + ((col + 1) % cols));
      } else if (e.key === "ArrowLeft") {
        setSelected(row * cols + ((col + cols - 1) % cols));
      } else if (e.key === "ArrowDown") {
        setSelected(((row + 1) % rows) * cols + col);
      } else if (e.key === "ArrowUp") {
        setSelected(((row - 1 + rows) % rows) * cols + col);
      } else if (e.key === "Enter") {
        openChannel(selected);
      }
    });

    function updateClock() {
      const now = new Date();
      timeEl.textContent = now.toLocaleTimeString([], {
        hour: "2-digit",
        minute: "2-digit"
      });
      dateEl.textContent = now.toLocaleDateString([], {
        weekday: "short",
        day: "2-digit",
        month: "2-digit"
      });
    }

    setInterval(updateClock, 1000);
    updateClock();

    let audioCtx;

    function getCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      return audioCtx;
    }

    function beep(freq, dur, gainVal) {
      const ctx = getCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "square";
      osc.frequency.value = freq;
      gain.gain.value = gainVal;
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + dur);
    }

    function playMoveSound() {
      beep(900, 0.05, 0.05);
    }

    function playClickSound() {
      beep(600, 0.08, 0.08);
    }
  </script>
</body>
</html>
